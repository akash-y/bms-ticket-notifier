name: BMS Ticket Checker

on:
  schedule:
    # GitHub does NOT honour this interval. Measured on this repo: a */5 cron
    # produced zero scheduled runs in 28 minutes, and */30 produced gaps of up
    # to 3h54m. So the cron is only a request to *start* a run; each run then
    # polls on its own clock (BMS_LOOP_MINUTES) to cover the gap between
    # starts. Keep it frequent so a new run begins soon after one ends.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Manual trigger button

# Runs are long-lived pollers, so a new one will usually be queued while
# another is still going. Queue it rather than cancel: cancelling would kill a
# live poller and discard state it had not committed yet.
concurrency:
  group: bms-checker
  cancel-in-progress: false

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    # Must exceed BMS_LOOP_MINUTES, plus setup and the final commit.
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Yield if an earlier run is still active
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Belt-and-suspenders over `concurrency`, which has let a scheduled
          # run start while a dispatched one was still polling — two pollers at
          # once means duplicate emails. Run IDs increase monotonically, so any
          # in-progress run with a lower ID than mine started earlier; yield to
          # it and exit cleanly so only the earliest poller runs.
          me=${{ github.run_id }}
          older=$(gh run list --repo "$GITHUB_REPOSITORY" \
                    --workflow=bms-checker.yml --status in_progress \
                    --json databaseId --jq "[.[] | select(.databaseId < $me)] | length" \
                    || echo 0)
          if [ "${older:-0}" -gt 0 ]; then
            echo "An earlier run is still active — yielding to it."
            echo "SKIP=1" >> "$GITHUB_ENV"
          else
            echo "No earlier active run — proceeding as the poller."
          fi

      - name: Checkout
        if: env.SKIP != '1'
        uses: actions/checkout@v6

      - name: Set up uv
        if: env.SKIP != '1'
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'

      - name: Install dependencies
        if: env.SKIP != '1'
        run: uv sync --frozen

      - name: Run checker
        if: env.SKIP != '1'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          BMS_URL: ${{ vars.BMS_URL }}
          BMS_DATES: ${{ vars.BMS_DATES }}
          BMS_THEATRE: ${{ vars.BMS_THEATRE }}
          BMS_TIME: ${{ vars.BMS_TIME }}
          BMS_SCREEN: ${{ vars.BMS_SCREEN }}
          # JSON array of independent watches; overrides the flat vars above.
          BMS_WATCHES: ${{ vars.BMS_WATCHES }}
          # Poll for ~55 min per run, so coverage does not depend on GitHub
          # starting the next run on time. 0 = single-shot (local use).
          BMS_LOOP_MINUTES: ${{ vars.BMS_LOOP_MINUTES || '55' }}
          BMS_POLL_SECONDS: ${{ vars.BMS_POLL_SECONDS || '60' }}
        run: uv run main.py

      - name: Commit updated state
        if: env.SKIP != '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # bms_state.json is a generated snapshot — never merge it line-by-line
          # (that conflicts when two runs push different states). Instead, on a
          # rejected push, reset to the remote tip, re-apply THIS run's state on
          # top, and retry. Last writer wins, which is correct for a snapshot.
          cp bms_state.json /tmp/newstate.json
          for i in $(seq 1 6); do
            git fetch -q origin main
            git reset -q --hard origin/main
            cp /tmp/newstate.json bms_state.json
            git add bms_state.json
            git diff --cached --quiet && { echo "state already current"; exit 0; }
            git commit -q -m "chore: update bms_state.json [skip ci]"
            git push -q && { echo "state pushed"; exit 0; }
            echo "push rejected (attempt $i) — remote moved, retrying"
            sleep $((RANDOM % 5 + 1))
          done
          echo "::error::could not push state after 6 attempts"
          exit 1