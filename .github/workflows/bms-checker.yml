name: BMS Ticket Checker

on:
  schedule:
    # GitHub does NOT honour this interval. Measured on this repo: a */5 cron
    # produced zero scheduled runs in 28 minutes, and */30 produced gaps of up
    # to 3h54m. So the cron is only a request to *start* a run; each run then
    # polls on its own clock (BMS_LOOP_MINUTES) to cover the gap between
    # starts. Keep it frequent so a new run begins soon after one ends.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Manual trigger button

# Runs are long-lived pollers, so a new one will usually be queued while
# another is still going. Queue it rather than cancel: cancelling would kill a
# live poller and discard state it had not committed yet.
concurrency:
  group: bms-checker
  cancel-in-progress: false

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    # Must exceed BMS_LOOP_MINUTES, plus setup and the final commit.
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run checker
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          BMS_URL: ${{ vars.BMS_URL }}
          BMS_DATES: ${{ vars.BMS_DATES }}
          BMS_THEATRE: ${{ vars.BMS_THEATRE }}
          BMS_TIME: ${{ vars.BMS_TIME }}
          BMS_SCREEN: ${{ vars.BMS_SCREEN }}
          # JSON array of independent watches; overrides the flat vars above.
          BMS_WATCHES: ${{ vars.BMS_WATCHES }}
          # Poll for ~55 min per run, so coverage does not depend on GitHub
          # starting the next run on time. 0 = single-shot (local use).
          BMS_LOOP_MINUTES: ${{ vars.BMS_LOOP_MINUTES || '55' }}
          BMS_POLL_SECONDS: ${{ vars.BMS_POLL_SECONDS || '60' }}
        run: uv run main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bms_state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update bms_state.json [skip ci]"
          # Another run may have pushed since checkout. Rebase and retry so a
          # lost race does not fail the run — red runs are a real signal here.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase --autostash origin main || exit 1
          done
          git push