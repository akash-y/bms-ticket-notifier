name: BMS Ticket Checker

on:
  schedule:
    # Every 5 minutes (GitHub's minimum). Note that GitHub runs scheduled
    # workflows on a best-effort basis and skips ticks under load — observed
    # gaps of 2h+ on this repo at */30 — so treat this as "as often as
    # GitHub will allow", not a guarantee.
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Manual trigger button

jobs:
  check-tickets:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run checker
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          BMS_URL: ${{ vars.BMS_URL }}
          BMS_DATES: ${{ vars.BMS_DATES }}
          BMS_THEATRE: ${{ vars.BMS_THEATRE }}
          BMS_TIME: ${{ vars.BMS_TIME }}
          BMS_SCREEN: ${{ vars.BMS_SCREEN }}
        run: uv run main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bms_state.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update bms_state.json [skip ci]"
          # Another run may have pushed since checkout. Rebase and retry so a
          # lost race does not fail the run — red runs are a real signal here.
          for i in 1 2 3; do
            git push && exit 0
            git pull --rebase --autostash origin main || exit 1
          done
          git push